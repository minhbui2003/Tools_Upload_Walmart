name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Upload-Toni-Windows
            asset_name: Upload-Toni-Windows.exe
            pyinstaller_args: "--windowed --name Upload-Toni-Windows main.py"
          - os: macos-latest
            artifact_name: Upload-Toni-MacOS
            asset_name: Upload-Toni-MacOS.app
            pyinstaller_args: "--windowed --name Upload-Toni-MacOS main.py"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change this if you need a specific version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Archive MacOS .app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r Upload-Toni-MacOS.zip Upload-Toni-MacOS.app
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.exe
            dist/${{ matrix.artifact_name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/Upload-Toni-Windows/Upload-Toni-Windows.exe
            artifacts/Upload-Toni-MacOS/Upload-Toni-MacOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
