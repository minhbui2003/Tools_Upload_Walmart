name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: build-windows
            pyinstaller_args: "--onefile --windowed --name POD_Marketplace main.py"
            upload_path: dist/POD_Marketplace.exe
          - os: macos-latest
            artifact_name: build-macos
            pyinstaller_args: "--onedir --windowed --name POD_Marketplace main.py"
            upload_path: dist/POD_Marketplace.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change this if you need a specific version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Archive MacOS .app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r POD_Marketplace.zip POD_Marketplace.app
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_path }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/build-windows/POD_Marketplace.exe
            artifacts/build-macos/POD_Marketplace.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
